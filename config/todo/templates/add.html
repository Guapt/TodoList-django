{% extends 'layout.html' %} {% block title %} todo:Add{% endblock %} 
{% block content %}

<div class="h-[90vh] w-full bg-blue-100 flex justify-center items-center">
    <div class="grid grid-cols-2 shadow-xl shadow-white">
        <img src="https://img.freepik.com/free-vector/colorful-todo-list-illustration_1308-172589.jpg" alt="todo"
            class="" />
        <form action="{% url 'todo_add' %}" method="post" class="p-6 bg-aqua-400 flex gap-4 flex-col">
            {% csrf_token %}
            <div class="flex flex-col gap-2">
                <label for="title" class="block mb-2.5 text-sm font-medium text-heading">Title
                </label>
                <input type="text" name="title" id="title"
                    class="border border-black-300 p-3 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none"
                    placeholder="e.g play cricket" />
            </div>

            <div class="flex flex-col gap-2">
                <label for="description" class="block mb-2.5 text-sm font-medium text-heading">Description
                </label>
                <textarea name="description" id="description" rows="4" placeholder="e.g., Will complete on 02/03/2026"
                    class="border border-black-300 p-3 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none"></textarea>
            </div>

            <div class="flex flex-col gap-2">
                <label for="status" class="text-sm font-medium text-gray-700">
                    Status
                </label>

                <select name="status" id="status"
                    class="border border-black-300 p-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="" disabled selected>Select status</option>
                    <option value="panding">Pending</option>
                    <option value="fullfilled">Fulfilled</option>
                    <option value="rejected">Rejected</option>
                </select>
            </div>

            <button type="submit" class="p-2 bg-blue-400 mt-4 w-1/3 rounded-full hover:cursor-pointer">Submit</button>
            <h1>{{error}}</h1>
        </form>
    </div>
</div>
{% endblock %}
